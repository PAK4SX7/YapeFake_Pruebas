<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yape - En Mantenimiento</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #660085;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ====== SÍMBOLO DE ADVERTENCIA (SVG) ====== */
        .warning-icon {
            width: 90px;
            height: 90px;
            margin: 0 auto 25px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .warning-icon svg {
            width: 100%;
            height: 100%;
        }

        /* ====== TEXTOS ====== */
        .card h1 {
            font-size: 1.6rem;
            color: #660085;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .card p {
            font-size: 1.1rem;
            color: #555555;
            line-height: 1.6;
            font-weight: 400;
        }

        .divider {
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #660085, #9b30ff);
            border-radius: 2px;
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- Símbolo de advertencia en SVG -->
        <div class="warning-icon">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Triángulo -->
                <polygon
                    points="50,8 95,88 5,88"
                    fill="#FFB800"
                    stroke="#E5A500"
                    stroke-width="3"
                    stroke-linejoin="round"
                />
                <!-- Signo de exclamación -->
                <rect x="46" y="32" width="8" height="28" rx="4" fill="#660085"/>
                <circle cx="50" cy="73" r="5" fill="#660085"/>
            </svg>
        </div>

        <h1>Yape en mantenimiento</h1>

        <div class="divider"></div>

        <p>Corrigiendo errores.<br>Disculpa las molestias.</p>

    </div>

</body>
</html>
